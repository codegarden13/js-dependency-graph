<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>NodeAnalyzer</title>

  <!-- Bootstrap -->
  <link href="/assets/css/bootstrap.min.css" rel="stylesheet" />

  <!-- app -->
  <link href="/assets/css/style.css" rel="stylesheet" />


</head>

<body class="p-3 p-lg-4">
  <div class="container-fluid">

    <div class="d-flex align-items-center justify-content-between mb-3">
      <div>
        <h2 class="fs-4 fw-semibold mb-0">NodeAnalyzer</h2>
        <div class="small text-secondary">Dependency graph and file diagnostics</div>
      </div>
      <span id="status" class="small text-secondary"></span>
    </div>

    <div class="row g-3 g-lg-4 align-items-start">
      <!-- LEFT: graph -->
      <main class="col-12 col-lg-7 col-xl-8">
        <div class="card shadow-sm">
          <div class="card-header py-2 d-flex align-items-center justify-content-between">
            <span class="small fw-semibold" id="graphInfoHeader">Graph</span>
            <span class="small text-secondary">Click a node to inspect</span>
          </div>
          <div class="card-body p-2">
            <svg id="codeStructureSvg" width="1200" height="800"></svg>
          </div>
        </div>
      </main>

      <!-- RIGHT: apps + panels -->
      <aside class="col-12 col-lg-5 col-xl-4">
        <div class="accordion" id="rightAccordion">

          <!-- Apps -->
          <div class="accordion-item">
            <h2 class="accordion-header" id="accAppsHdr">
              <button class="accordion-button collapsed py-2" type="button" data-bs-toggle="collapse" data-bs-target="#accApps" aria-expanded="false" aria-controls="accApps">
                <span class="small fw-semibold">Apps</span>
                <span class="badge bg-secondary ms-2" id="appsCountBadge">0</span>
              </button>
            </h2>
            <div id="accApps" class="accordion-collapse collapse" aria-labelledby="accAppsHdr" data-bs-parent="#rightAccordion">
              <div class="accordion-body p-2">
                <div id="appList" class="appsList appsScroll" role="list">
                  <div class="text-secondary small px-2 py-2">Loading…</div>
                </div>

                <!-- Hidden state used by runAnalysis() -->
                <input type="hidden" id="appSelect" value="" />

                <div class="d-flex gap-2 align-items-center mt-2">
                  <button type="button" class="btn btn-outline-secondary btn-sm" id="helpBtn">Help</button>
                </div>
              </div>
            </div>
          </div>

          <!-- Recommendations -->
          <div class="accordion-item">
            <h2 class="accordion-header" id="accRecoHdr">
              <button class="accordion-button collapsed py-2" type="button" data-bs-toggle="collapse" data-bs-target="#accReco" aria-expanded="false" aria-controls="accReco">
                <span class="small fw-semibold">Recommendations</span>
                <span class="badge bg-secondary ms-2" id="recoCountBadge">0</span>
              </button>
            </h2>
            <div id="accReco" class="accordion-collapse collapse" aria-labelledby="accRecoHdr" data-bs-parent="#rightAccordion">
              <div class="accordion-body panelScroll" id="recommendationsPanel"></div>
            </div>
          </div>

          <!-- Legend & Filter -->
          <div class="accordion-item">
            <h2 class="accordion-header" id="accLegendHdr">
              <button class="accordion-button collapsed py-2" type="button" data-bs-toggle="collapse" data-bs-target="#accLegend" aria-expanded="false" aria-controls="accLegend">
                <span class="small fw-semibold">Legend &amp; Filter</span>
                <span class="small text-secondary ms-2" id="filterSummary">architecture</span>
              </button>
            </h2>
            <div id="accLegend" class="accordion-collapse collapse" aria-labelledby="accLegendHdr" data-bs-parent="#rightAccordion">
              <div class="accordion-body panelScroll" id="legendFilterPanel"></div>
            </div>
          </div>

          <!-- Selection -->
          <div class="accordion-item">
            <h2 class="accordion-header" id="accSelectionHdr">
              <button class="accordion-button collapsed py-2" type="button" data-bs-toggle="collapse" data-bs-target="#accSelection" aria-expanded="false" aria-controls="accSelection">
                <span class="small fw-semibold">Selection</span>
                <span class="small text-secondary ms-2" id="selectionSummary">none</span>
              </button>
            </h2>
            <div id="accSelection" class="accordion-collapse collapse" aria-labelledby="accSelectionHdr" data-bs-parent="#rightAccordion">
              <div class="accordion-body panelScroll" id="graphInfoPanel"></div>
            </div>
          </div>

          <!-- README -->
          <div class="accordion-item">
            <h2 class="accordion-header" id="accReadmeHdr">
              <button class="accordion-button collapsed py-2" type="button" data-bs-toggle="collapse" data-bs-target="#accReadme" aria-expanded="false" aria-controls="accReadme">
                <span class="small fw-semibold">README</span>
                <span class="small text-secondary ms-2" id="readmeSummary">none</span>
              </button>
            </h2>
            <div id="accReadme" class="accordion-collapse collapse" aria-labelledby="accReadmeHdr" data-bs-parent="#rightAccordion">
              <div class="accordion-body panelScroll" id="readmePanel"></div>
            </div>
          </div>

        </div>
      </aside>
    </div>
  </div>

  <!-- libs (globals) -->
  <script src="/assets/js/d3.v7.min.js"></script>
  <script src="/assets/js/bootstrap.bundle.min.js"></script>

  <!-- Markdown rendering (globals) -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js"></script>

  <!-- App entry (ESM) -->
  <script type="module" src="/assets/js/main.js"></script>

  <!-- clear panels button (optional; only wired if the button exists) -->
  <script>
    (function () {
      const btn = document.getElementById("clearPanelsBtn");
      if (!btn) return;

      btn.addEventListener("click", () => {
        document.getElementById("graphInfoPanel")?.replaceChildren();
        document.getElementById("readmePanel")?.replaceChildren();
      });
    })();
  </script>


  <div id="helpPanel" class="help-panel d-none" role="dialog" aria-label="Help">
    <div class="help-panel__header" id="helpPanelHeader">
      <div class="help-panel__title">Help</div>
      <div class="help-panel__actions">
        <button type="button" class="btn btn-sm btn-outline-secondary" id="helpReloadBtn">Reload</button>
        <button type="button" class="btn btn-sm btn-outline-secondary" id="helpCloseBtn">Close</button>
      </div>
    </div>
    <div class="help-panel__body" id="helpPanelBody">
      <div class="text-secondary small p-2">Loading…</div>
    </div>
  </div>
</body>

</html>
